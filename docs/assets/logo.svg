<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220" role="img" aria-label="FlightDeck">
  <defs>
    <clipPath id="dial">
      <circle cx="110" cy="110" r="73"/>
    </clipPath>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="200" height="200" rx="46" fill="#17191f"/>
  <rect x="11.5" y="11.5" width="197" height="197" rx="44.5" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="3"/>

  <g clip-path="url(#dial)" transform="rotate(-10 110 110)">
    <rect x="20" y="20" width="180" height="90" fill="url(#sky)"/>
    <rect x="20" y="110" width="180" height="90" fill="url(#ground)"/>
    <rect x="20" y="108.5" width="180" height="3" fill="#FFFFFF"/>
    <rect x="97" y="89" width="26" height="2" rx="1" fill="#FFFFFF" opacity="0.85"/>
    <rect x="103.5" y="99" width="13" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
    <rect x="97" y="129" width="26" height="2" rx="1" fill="#FFFFFF" opacity="0.85"/>
    <rect x="103.5" y="119" width="13" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  </g>

  <g fill="#F97316">
    <rect x="67.5" y="108" width="25.5" height="4" rx="2"/>
    <rect x="127" y="108" width="25.5" height="4" rx="2"/>
    <circle cx="110" cy="110" r="4"/>
  </g>
  <circle cx="110" cy="110" r="1.8" fill="#FFF7ED"/>

  <circle cx="110" cy="110" r="75.5" fill="none" stroke="#2E333E" stroke-width="5.5"/>
  <circle cx="110" cy="110" r="79" fill="none" stroke="#454B59" stroke-width="1.2"/>
</svg>
