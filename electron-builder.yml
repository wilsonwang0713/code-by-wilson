appId: io.github.luojiahai.code-by-wire
productName: Code-by-wire
copyright: Copyright © 2026 luojiahai
# Native modules are rebuilt explicitly via `pnpm rebuild:native`; don't let
# electron-builder run its own (it misbehaves under pnpm).
npmRebuild: false
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asarUnpack:
  - "**/*.node"
mac:
  category: public.app-category.developer-tools
  icon: build/icon.png
  # Signed + notarized in CI, where the Developer ID cert (CSC_LINK) and App
  # Store Connect API key (APPLE_API_* env) are present. Locally, `pnpm dist`
  # sets CSC_IDENTITY_AUTO_DISCOVERY=false to skip all of this and stay fast.
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  target:
    - target: dmg
dmg:
  title: ${productName} ${version}
publish:
  provider: github
  owner: luojiahai
  repo: code-by-wire
