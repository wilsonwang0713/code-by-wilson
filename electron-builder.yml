appId: io.github.wilsonwang0713.code-by-wilson
productName: Code-by-wilson
copyright: Copyright © 2026 wilsonwang0713
# Native modules are rebuilt explicitly via `pnpm rebuild:native`; don't let
# electron-builder run its own (it misbehaves under pnpm).
npmRebuild: false
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asarUnpack:
  - "**/*.node"
  # node-pty's winpty fallback (selected on Windows builds < 18309 — see terminal/conpty.ts) loads
  # winpty.dll and forks winpty-agent.exe as filesystem siblings of pty.node. Neither is a *.node file,
  # so without this they stay inside app.asar where Windows can't LoadLibrary the DLL or spawn the agent,
  # and every Managed session on an older build dies as "[process exited]".
  - "**/node-pty/build/Release/*"
mac:
  category: public.app-category.developer-tools
  icon: build/icon.png
  # Force ${arch} into the zip filename so the arm64 and x64 update zips stay distinct in latest-mac.yml
  # (the same arch-clobber reasoning behind the dmg/nsis artifactName overrides). The dmg keeps its own
  # dmg.artifactName, so this only names the zip.
  artifactName: ${productName}-${arch}.${ext}
  # Signed + notarized in CI, where the Developer ID cert (CSC_LINK) and App
  # Store Connect API key (APPLE_API_* env) are present. Locally, `pnpm dist`
  # sets CSC_IDENTITY_AUTO_DISCOVERY=false to skip all of this and stay fast.
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  target:
    - target: dmg
    # Squirrel.Mac (electron-updater) can only apply an update from a .zip; the .dmg is install-only.
    - target: zip
dmg:
  # Force ${arch} into the filename. electron-builder's default drops it for x64, so the Intel dmg
  # would ship as Code-by-wilson.dmg with no arch label next to Code-by-wilson-arm64.dmg — distinct
  # enough not to clobber, but confusing for a four-target release. Make both arches explicit.
  artifactName: ${productName}-${arch}.${ext}
  title: ${productName} ${version}
win:
  # icon.png is a hard-cornered full-bleed square so macOS Tahoe can mask it to a squircle; Windows
  # draws icons as-is with no rounded-rect frame, so it gets its own render with the tile's rounded
  # corners baked in.
  icon: build/icon-win.png
  target:
    - target: nsis
nsis:
  # x64 and arm64 build in separate electron-builder invocations (one per runner), so neither
  # sees the other and both fall back to the default ...-Setup-${version}.exe — identical names
  # that clobber each other on upload and collide in latest.yml (electron-updater can't tell the
  # arches apart). Force the arch into the filename so the two installers stay distinct.
  artifactName: ${productName}-Setup-${arch}.${ext}
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
publish:
  provider: github
  owner: wilsonwang0713
  repo: code-by-wilson
