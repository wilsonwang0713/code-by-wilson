name: Feature request
description: Suggest an improvement or new capability.
labels: [needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the app makes hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Mention alternatives you considered.
    validations:
      required: true
