name: Bug report
description: Something in the app behaves incorrectly.
labels: [needs-triage]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you did, what you expected, what you got instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 14.5 (Apple Silicon), or Windows 11 (x64)
    validations:
      required: true
