name: Bug report
description: Something in the app behaves incorrectly.
labels: [needs-triage]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you did, what you expected, what you got instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. 14.5 (Apple Silicon)
    validations:
      required: true
