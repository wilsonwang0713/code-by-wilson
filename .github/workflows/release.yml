name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # The tag is the source of truth for the release; package.json must agree.
  # Fail fast and cheap if they disagree, before the mac runner spins up.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag must match package.json version
        run: |
          tag="${GITHUB_REF_NAME}"
          pkg="v$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag $tag does not match package.json version $pkg"
            exit 1
          fi

  # Apple Silicon only. Intel (x64) is dropped: GitHub's macos-13 runners queue
  # for ages and are on the way out, and the user base is arm64.
  release:
    needs: verify
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm rebuild:native
      - run: pnpm build
      # Build the dmg but do NOT let electron-builder publish. Its GitHub
      # publisher uploads files in parallel and, because a draft release can't
      # be looked up by tag, each upload races to create its own draft —
      # producing duplicate drafts with the assets split across them. We upload
      # deterministically below instead.
      - run: pnpm exec electron-builder --mac --arm64 --publish never
      # Create the draft release exactly once (or reuse it on a re-run), then
      # upload every artifact. --clobber makes re-runs idempotent.
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --draft --title "code-by-wire $tag" --generate-notes
          fi
          gh release upload "$tag" --clobber \
            release/*.dmg release/*.dmg.blockmap release/latest-mac.yml
