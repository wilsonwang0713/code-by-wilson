name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # The tag is the source of truth for the release; package.json must agree.
  # Fail fast and cheap if they disagree, before any runner spins up.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Tag must match package.json version
        run: |
          tag="${GITHUB_REF_NAME}"
          pkg="v$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag $tag does not match package.json version $pkg"
            exit 1
          fi

  # Create the draft release exactly once, before the matrix legs race to
  # upload. Both legs upload with --clobber, so re-runs are idempotent.
  draft:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create the draft release once
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --draft --title "Code-by-wire $tag" --generate-notes
          fi

  build:
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm rebuild:native
      - run: pnpm build

      # ---- macOS: sign + notarize + upload ----
      # notarytool's --key wants a .p8 file on disk, not its contents. The key
      # is stored as a base64 secret, so decode it to a temp file and point
      # APPLE_API_KEY at that path below. (base64 -D is the macOS spelling.)
      - if: matrix.os == 'macos-14'
        name: Decode App Store Connect API key
        run: echo "$APPLE_API_KEY_B64" | base64 -D > "$RUNNER_TEMP/apple-api-key.p8"
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY }}
      # CSC_* sign the app with the Developer ID cert; APPLE_API_* notarize it
      # with notarytool via the App Store Connect key. electron-builder staples
      # the ticket to the dmg so Gatekeeper passes on a fresh download.
      - if: matrix.os == 'macos-14'
        run: pnpm exec electron-builder --mac --arm64 --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/apple-api-key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - if: matrix.os == 'macos-14'
        name: Upload macOS artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" --clobber release/*.dmg release/*.dmg.blockmap release/latest-mac.yml

      # ---- Windows: unsigned NSIS + upload ----
      - if: matrix.os == 'windows-latest'
        shell: pwsh
        run: pnpm exec electron-builder --win --x64 --publish never
      - if: matrix.os == 'windows-latest'
        name: Upload Windows artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$env:GITHUB_REF_NAME" --clobber (Get-Item release/*.exe, release/*.exe.blockmap, release/latest.yml)
