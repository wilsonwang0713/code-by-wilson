name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # The tag is the source of truth for the release; package.json must agree.
  # Fail fast and cheap if they disagree, before the mac runner spins up.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Tag must match package.json version
        run: |
          tag="${GITHUB_REF_NAME}"
          pkg="v$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag $tag does not match package.json version $pkg"
            exit 1
          fi

  # Apple Silicon only. Intel (x64) is dropped: GitHub's macos-13 runners queue
  # for ages and are on the way out, and the user base is arm64.
  release:
    needs: verify
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm rebuild:native
      - run: pnpm build
      # Build the dmg but do NOT let electron-builder publish. Its GitHub
      # publisher uploads files in parallel and, because a draft release can't
      # be looked up by tag, each upload races to create its own draft —
      # producing duplicate drafts with the assets split across them. We upload
      # deterministically below instead.
      # notarytool's --key wants a .p8 file on disk, not its contents. The key
      # is stored as a base64 secret, so decode it to a temp file and point
      # APPLE_API_KEY at that path below. (base64 -D is the macOS spelling.)
      - name: Decode App Store Connect API key
        run: echo "$APPLE_API_KEY_B64" | base64 -D > "$RUNNER_TEMP/apple-api-key.p8"
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY }}
      # CSC_* sign the app with the Developer ID cert; APPLE_API_* notarize it
      # with notarytool via the App Store Connect key. electron-builder staples
      # the ticket to the dmg so Gatekeeper passes on a fresh download.
      - run: pnpm exec electron-builder --mac --arm64 --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/apple-api-key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      # Create the draft release exactly once (or reuse it on a re-run), then
      # upload every artifact. --clobber makes re-runs idempotent.
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --draft --title "Code-by-wire $tag" --generate-notes
          fi
          gh release upload "$tag" --clobber \
            release/*.dmg release/*.dmg.blockmap release/latest-mac.yml
