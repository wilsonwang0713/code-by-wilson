name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # The tag is the source of truth for the release; package.json must agree.
  # Fail fast and cheap if they disagree, before any runner spins up.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Tag must match package.json version
        run: |
          tag="${GITHUB_REF_NAME}"
          pkg="v$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag $tag does not match package.json version $pkg"
            exit 1
          fi

  # Create the draft release exactly once, before the matrix legs race to
  # upload. Both legs upload with --clobber, so re-runs are idempotent.
  draft:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create the draft release once
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --draft --title "FlightDeck $tag" --generate-notes
          fi

  build:
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
            arch: arm64
          # x64 cross-compiles on the Apple Silicon runner: GitHub's Intel (macos-13) runners are
          # scarce/slow and on the deprecation path, so we build x64 on macos-14 with an arch-aware
          # native rebuild (see the rebuild step) instead of depending on Intel-runner availability.
          - os: macos-14
            platform: mac
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64
          - os: windows-11-arm
            platform: win
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Rebuild native modules for the TARGET arch, not the host's — the macOS x64 leg cross-compiles
      # on the arm64 runner. Call electron-rebuild directly: `pnpm run rebuild:native -- --arch x64`
      # forwards a literal `--` that electron-rebuild ignores, silently leaving arm64 binaries inside
      # the x64 app (which then crashes on load). Module list mirrors the rebuild:native script.
      - run: pnpm exec electron-rebuild -f -w better-sqlite3,node-pty --arch ${{ matrix.arch }}
      - run: pnpm build

      # ---- macOS: sign + notarize + upload ----
      # notarytool's --key wants a .p8 file on disk, not its contents. The key
      # is stored as a base64 secret, so decode it to a temp file and point
      # APPLE_API_KEY at that path below. (base64 -D is the macOS spelling.)
      - if: matrix.platform == 'mac'
        name: Decode App Store Connect API key
        run: echo "$APPLE_API_KEY_B64" | base64 -D > "$RUNNER_TEMP/apple-api-key.p8"
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY }}
      # CSC_* sign the app with the Developer ID cert; APPLE_API_* notarize it
      # with notarytool via the App Store Connect key. Both mac arches sign with
      # the same arch-agnostic credentials.
      - if: matrix.platform == 'mac'
        run: pnpm exec electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/apple-api-key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - if: matrix.platform == 'mac'
        name: Upload macOS installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          zips=(release/*.zip)
          if [[ ${#zips[@]} -eq 0 ]]; then
            echo "::error::No .zip artifact found in release/; auto-update artifact wasn't built"
            exit 1
          fi
          assets=(release/*.dmg release/*.dmg.blockmap release/*.zip release/*.zip.blockmap)
          gh release upload "${GITHUB_REF_NAME}" --clobber "${assets[@]}"

      # ---- Windows: unsigned NSIS + upload ----
      - if: matrix.platform == 'win'
        shell: pwsh
        run: pnpm exec electron-builder --win --${{ matrix.arch }} --publish never
      - if: matrix.platform == 'win'
        name: Upload Windows installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $assets = Get-ChildItem -Path release/*.exe, release/*.exe.blockmap -ErrorAction SilentlyContinue
          if (-not ($assets | Where-Object { $_.Extension -eq '.exe' })) {
            throw "No Windows installer (.exe) was produced in release/"
          }
          gh release upload "$env:GITHUB_REF_NAME" --clobber @($assets.FullName)

      # ---- Per-arch auto-update manifest as an artifact ----
      # electron-builder writes a single-arch latest*.yml per leg. The merge job
      # combines them; uploading to the release here would clobber the others.
      # if-no-files-found: error preserves the old "fail loud on a missing
      # manifest" guarantee. Each leg matches exactly one of the two paths.
      - name: Upload update manifest
        uses: actions/upload-artifact@v4
        with:
          name: update-manifest-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/latest-mac.yml
            release/latest.yml
          if-no-files-found: error

  # Merge the four single-arch manifests into one latest-mac.yml and one
  # latest.yml so electron-updater can match the running machine's arch.
  # Without this, each leg's upload would overwrite the others' manifest.
  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      # No native modules needed; --ignore-scripts skips the better-sqlite3 build.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Download per-arch manifests
        uses: actions/download-artifact@v4
        with:
          pattern: update-manifest-*
          path: manifests
      # The merge step reads hardcoded per-arch paths; surface the actual
      # downloaded layout so a missing leg or path drift is obvious in the log.
      - name: List downloaded manifests
        run: ls -R manifests
      - name: Merge manifests
        run: |
          node scripts/merge-update-manifests.mts \
            --primary-arch arm64 --out latest-mac.yml \
            manifests/update-manifest-mac-arm64/latest-mac.yml \
            manifests/update-manifest-mac-x64/latest-mac.yml
          node scripts/merge-update-manifests.mts \
            --primary-arch x64 --out latest.yml \
            manifests/update-manifest-win-x64/latest.yml \
            manifests/update-manifest-win-arm64/latest.yml
      - name: Upload merged manifests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" --clobber latest-mac.yml latest.yml
