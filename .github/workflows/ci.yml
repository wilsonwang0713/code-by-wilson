name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  # Aggregate gate: a single, stable `test` check for branch protection to
  # require. The matrix above reports per-OS names (`tests (ubuntu-latest)`,
  # ...), so requiring those directly breaks every time the OS list changes;
  # requiring this job instead survives matrix edits.
  test:
    needs: tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: '[ "${{ needs.tests.result }}" = "success" ]'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
